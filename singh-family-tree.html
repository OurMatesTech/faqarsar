<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0b0f;color:#e8e4dc;font-family:'DM Sans',sans-serif;overflow:hidden;height:100vh;width:100vw}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,170,120,0.15);border-radius:3px}

#toolbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;
  background:linear-gradient(180deg,rgba(12,11,15,0.97) 0%,rgba(12,11,15,0.8) 60%,rgba(12,11,15,0) 100%);
  pointer-events:none;
}
#toolbar>*{pointer-events:auto}
.title-area{display:flex;align-items:baseline;gap:12px}
.title-area h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;color:#e8e4dc;letter-spacing:-0.02em}
.title-area .subtitle{font-size:11px;color:#6a6560;letter-spacing:0.04em}
.controls{display:flex;gap:8px;align-items:center}
.controls button,.controls .search-wrap{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);
  color:#9a9590;font-size:13px;padding:7px 14px;border-radius:10px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.25s;
}
.controls button:hover{background:rgba(255,255,255,0.1);color:#e8e4dc;border-color:rgba(200,170,120,0.2)}
.controls .lang-btn{background:rgba(200,170,120,0.1);border-color:rgba(200,170,120,0.25);color:rgba(200,170,120,0.9);font-weight:500}
.controls .lang-btn:hover{background:rgba(200,170,120,0.18);border-color:rgba(200,170,120,0.4)}
.search-wrap{display:flex;align-items:center;gap:6px;padding:0 14px !important;cursor:text}
.search-wrap .search-icon{color:#4a4540;font-size:13px;flex-shrink:0}
.search-wrap input{
  background:transparent;border:none;
  color:#e8e4dc;font-size:13px;width:170px;
  font-family:'DM Sans',sans-serif;outline:none;
  padding:7px 0;
}
.search-wrap input::placeholder{color:#4a4540}
.search-wrap:focus-within{border-color:rgba(200,170,120,0.3);background:rgba(255,255,255,0.07)}

#canvas-wrap{position:absolute;inset:0;overflow:hidden;cursor:grab}
#canvas-wrap.dragging{cursor:grabbing}
#canvas{position:absolute;transform-origin:0 0}

svg.lines{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
svg.lines path{fill:none;stroke:rgba(200,170,120,0.12);stroke-width:1.5;transition:stroke 0.3s,stroke-width 0.3s}
svg.lines path.highlighted{stroke:rgba(200,170,120,0.55);stroke-width:2.5}

.node{
  position:absolute;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;padding:14px 16px;
  cursor:pointer;transition:all 0.3s cubic-bezier(0.22,1,0.36,1);
  text-align:center;min-width:120px;
  backdrop-filter:blur(4px);
}
.node:hover{
  background:rgba(255,255,255,0.06);
  border-color:rgba(200,170,120,0.3);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
}
.node.active{
  background:rgba(200,170,120,0.1);
  border-color:rgba(200,170,120,0.5);
  box-shadow:0 0 40px rgba(200,170,120,0.1),0 8px 32px rgba(0,0,0,0.3);
  transform:translateY(-2px);
}
.node.ancestor{border-color:rgba(200,170,120,0.35);border-style:dashed}
.node.descendant{border-left:3px solid rgba(200,170,120,0.45)}
.node.search-match{
  background:rgba(200,170,120,0.12);
  border-color:rgba(200,170,120,0.45);
  box-shadow:0 0 20px rgba(200,170,120,0.06);
}
.node.dimmed{opacity:0.2;pointer-events:auto}
.node .mid-name{
  font-family:'Playfair Display',serif;font-size:15px;font-weight:500;
  color:#e8e4dc;letter-spacing:-0.01em;line-height:1.2;
}
.node .full-label{font-size:10px;color:#5a5550;margin-top:3px;letter-spacing:0.02em}
.node .gen-badge{
  display:inline-block;font-size:9px;color:#5a5550;
  background:rgba(255,255,255,0.04);border-radius:5px;
  padding:2px 7px;margin-top:5px;font-weight:500;
  letter-spacing:0.03em;
}
.node .desc-count{
  position:absolute;top:-9px;right:-9px;
  font-size:8px;font-weight:600;color:rgba(200,170,120,0.85);
  background:rgba(20,18,24,0.95);border:1px solid rgba(200,170,120,0.25);
  border-radius:10px;padding:2px 7px;min-width:20px;text-align:center;
  letter-spacing:0.02em;
}
.node .leaf-badge{
  display:inline-block;font-size:8px;color:#6a5040;
  background:rgba(200,170,120,0.06);border:1px solid rgba(200,170,120,0.1);
  border-radius:5px;padding:2px 7px;margin-top:4px;margin-left:3px;
  letter-spacing:0.02em;font-weight:500;
}
.node.leaf{border-style:dotted;border-color:rgba(255,255,255,0.05)}
.node.has-note{border-color:rgba(180,80,60,0.3)}
.node.has-location{border-color:rgba(80,170,120,0.35)}
.node .card-note{
  font-size:8px;color:rgba(180,80,60,0.7);margin-top:4px;
  font-style:italic;line-height:1.35;white-space:normal;
  max-width:120px;overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.node .card-note.location{
  color:rgba(80,190,120,0.9);font-style:normal;font-weight:500;
}

#detail-panel{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  z-index:100;min-width:380px;max-width:620px;width:auto;
  background:rgba(18,16,22,0.97);backdrop-filter:blur(24px);
  border:1px solid rgba(200,170,120,0.12);border-radius:18px;
  padding:22px 26px;display:none;
  box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.02) inset;
  opacity:0;transition:opacity 0.3s,transform 0.3s cubic-bezier(0.22,1,0.36,1);
}
#detail-panel.visible{display:block;opacity:1;transform:translateX(-50%) translateY(0)}
#detail-panel h3{
  font-family:'Playfair Display',serif;font-size:19px;font-weight:500;
  color:#e8e4dc;margin-bottom:4px;letter-spacing:-0.01em;
}
#detail-panel .lineage{font-size:12px;color:#8a8580;line-height:1.9;margin-top:10px}
#detail-panel .lineage .step{
  display:inline-block;padding:3px 10px;border-radius:8px;
  background:rgba(255,255,255,0.04);color:#a09a90;cursor:pointer;
  transition:all 0.2s;font-weight:400;
}
#detail-panel .lineage .step:hover{background:rgba(200,170,120,0.15);color:#e8e4dc}
#detail-panel .lineage .arrow{color:#3a3530;margin:0 4px;font-size:10px}
.detail-meta{display:flex;gap:16px;margin-top:10px;font-size:11px;color:#6a6560;flex-wrap:wrap}
.detail-meta span{padding:3px 0;display:inline-flex;align-items:center;gap:4px}
.detail-section{margin-top:12px}
.detail-section-label{
  font-size:10px;color:#4a4540;text-transform:uppercase;
  letter-spacing:0.08em;margin-bottom:6px;font-weight:600;
}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{
  font-size:11px;padding:4px 12px;border-radius:8px;
  background:rgba(255,255,255,0.04);color:#8a8580;cursor:pointer;
  border:1px solid transparent;transition:all 0.2s;font-weight:400;
}
.tag:hover{background:rgba(200,170,120,0.12);color:#e8e4dc;border-color:rgba(200,170,120,0.2)}
#close-detail{
  position:absolute;top:14px;right:16px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:#5a5550;font-size:14px;cursor:pointer;
  padding:4px 8px;border-radius:8px;
  transition:all 0.2s;line-height:1;
}
#close-detail:hover{color:#e8e4dc;background:rgba(255,255,255,0.08)}

#minimap{
  position:fixed;bottom:20px;right:20px;z-index:90;
  width:160px;height:100px;
  background:rgba(18,16,22,0.85);border:1px solid rgba(255,255,255,0.05);
  border-radius:10px;overflow:hidden;
  backdrop-filter:blur(8px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
#minimap canvas{width:100%;height:100%}
#minimap .viewport{
  position:absolute;border:1.5px solid rgba(200,170,120,0.45);
  border-radius:2px;pointer-events:none;
}

.zoom-hint{
  position:fixed;bottom:24px;right:200px;z-index:90;
  font-size:10px;color:#3a3530;letter-spacing:0.04em;
}

@media(max-width:768px){
  .controls{flex-wrap:wrap;justify-content:flex-end}
  .search-wrap input{width:120px}
  #detail-panel{min-width:92vw;max-width:96vw;padding:18px 20px;bottom:12px}
  #toolbar{padding:12px 16px}
  .title-area h1{font-size:18px}
  .zoom-hint{display:none}
}
@media(max-width:480px){
  .search-wrap input{width:100px}
  #minimap{width:120px;height:75px;bottom:12px;right:12px}
}
</style>

const NODE_W = 140, NODE_H = 80, GAP_X = 20, GAP_Y = 100, PAD = 80;
const positions = {};
let activeId = null;
let lang = 'en';
let scale = 1, tx = 0, ty = 0;
let isDragging = false, dragStartX, dragStartY, dragTxStart, dragTyStart;

function getGen(id, memo={}) {
  if (memo[id] !== undefined) return memo[id];
  if (!raw[id].parents.length) { memo[id] = 0; return 0; }
  memo[id] = getGen(raw[id].parents[0], memo) + 1;
  return memo[id];
}
const genMemo = {};
Object.keys(raw).forEach(id => getGen(id, genMemo));

const memberCount = Object.keys(raw).length;
const maxGen = Math.max(...Object.values(genMemo)) + 1;
document.querySelector('.subtitle').textContent = memberCount + ' members across ' + maxGen + ' generations';

function subtreeWidth(id) {
  const ch = raw[id].children;
  if (!ch.length) return NODE_W;
  let total = 0;
  ch.forEach((c, i) => { total += subtreeWidth(c); if (i < ch.length - 1) total += GAP_X; });
  return Math.max(NODE_W, total);
}

function layoutTree(id, x, y) {
  const w = subtreeWidth(id);
  positions[id] = { x: x + w / 2 - NODE_W / 2, y };
  const ch = raw[id].children;
  if (!ch.length) return;
  let cx = x;
  ch.forEach((c, i) => {
    const cw = subtreeWidth(c);
    layoutTree(c, cx, y + GAP_Y + NODE_H);
    cx += cw + GAP_X;
  });
}

layoutTree('p1', PAD, PAD);

function getAllDescendants(id) {
  const r = new Set(); const q = [...raw[id].children];
  while (q.length) { const c = q.shift(); r.add(c); q.push(...raw[c].children); }
  return r;
}
function countDesc(id) { return getAllDescendants(id).size; }
function getAncestors(id) {
  const r = []; let c = id;
  while (raw[c].parents.length) { c = raw[c].parents[0]; r.unshift(c); }
  return r;
}
function getSiblings(id) {
  if (!raw[id].parents.length) return [];
  return raw[raw[id].parents[0]].children.filter(c => c !== id);
}
function name(id) {
  if (lang === 'pa' && raw[id].gurmukhi) {
    var g = raw[id].gurmukhi;
    var parts = g.split(' ');
    if (parts.length === 1) return parts[0];
    if (parts.length === 2) return parts[0];
    return parts.slice(1, -1).join(' ');
  }
  return raw[id].middleName;
}
function fullName(id) {
  if (lang === 'pa' && raw[id].gurmukhi) return raw[id].gurmukhi;
  return [raw[id].firstName, raw[id].middleName, raw[id].lastName].filter(Boolean).join(' ');
}

function getNodeClasses(id) {
  const p = raw[id];
  const isLocation = p.notes && p.notes.includes('\ud83d\udccd');
  const isNoChildren = p.notes === 'No children' || p.notes === 'Died with no children';
  const hasOtherNote = p.notes && !isNoChildren;
  let cls = 'node';
  if (isNoChildren) cls += ' leaf';
  if (hasOtherNote && !isLocation) cls += ' has-note';
  if (isLocation) cls += ' has-location';
  return cls;
}

function buildNodes() {

    const p = raw[id];
    const pos = positions[id];
    const div = document.createElement('div');
    const isLocation = p.notes && p.notes.includes('\ud83d\udccd');
    const isNoChildren = p.notes === 'No children' || p.notes === 'Died with no children';
    const hasOtherNote = p.notes && !isNoChildren;
    div.className = getNodeClasses(id);
    div.id = 'node-' + id;
    div.style.left = pos.x + 'px';
    div.style.top = pos.y + 'px';
    div.style.width = NODE_W + 'px';
    const dc = countDesc(id);
    const badgeRow = `<div class="gen-badge">G${genMemo[id]+1}</div>${isNoChildren ? '<span class="leaf-badge">' + p.notes.toLowerCase() + '</span>' : ''}`;
    const noteRow = hasOtherNote ? `<div class="card-note${isLocation ? ' location' : ''}">${p.notes}</div>` : '';
    div.innerHTML = `<div class="mid-name">${p.middleName}</div><div class="full-label">${fullName(id)}</div>${badgeRow}${noteRow}${dc > 0 ? `<div class="desc-count">${dc}</div>` : ''}`;
    div.onclick = () => selectPerson(id);
    canvas.appendChild(div);
  });
}

function buildLines() {
  svg.innerHTML = '';
  Object.keys(raw).forEach(id => {
    raw[id].children.forEach(cid => {
      const p1 = positions[id], p2 = positions[cid];
      const x1 = p1.x + NODE_W / 2, y1 = p1.y + NODE_H;
      const x2 = p2.x + NODE_W / 2, y2 = p2.y;
      const midY = y1 + (y2 - y1) * 0.5;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}`);
      path.setAttribute('data-from', id);
      path.setAttribute('data-to', cid);
      svg.appendChild(path);
    });
  });
  const bb = getBounds();
  svg.setAttribute('width', bb.maxX + PAD);
  svg.setAttribute('height', bb.maxY + PAD);
}

function getBounds() {
  let minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;
  Object.values(positions).forEach(p => {
    minX = Math.min(minX, p.x);
    minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x + NODE_W);
    maxY = Math.max(maxY, p.y + NODE_H);
  });
  return { minX, minY, maxX, maxY };
}

function applyTransform() {
  canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  drawMinimap();
}

function resetView() {
  const bb = getBounds();
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  const sw = cw / (bb.maxX + PAD * 2), sh = ch / (bb.maxY + PAD * 2);
  scale = Math.min(sw, sh, 1);
  tx = (cw - (bb.maxX + PAD * 2) * scale) / 2;
  ty = (ch - (bb.maxY + PAD * 2) * scale) / 2 + 30;
  applyTransform();
}

function zoomIn() { scale = Math.min(scale * 1.2, 3); applyTransform(); }
function zoomOut() { scale = Math.max(scale / 1.2, 0.15); applyTransform(); }

wrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const oldScale = scale;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.15, Math.min(3, scale * delta));
  tx = mx - (mx - tx) * (scale / oldScale);
  ty = my - (my - ty) * (scale / oldScale);
  applyTransform();
}, { passive: false });

wrap.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node')) return;
  isDragging = true; wrap.classList.add('dragging');
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragTxStart = tx; dragTyStart = ty;
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  tx = dragTxStart + (e.clientX - dragStartX);
  ty = dragTyStart + (e.clientY - dragStartY);
  applyTransform();
});
window.addEventListener('mouseup', () => { isDragging = false; wrap.classList.remove('dragging'); });

let touchStartDist = 0, touchStartScale = 1;
wrap.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1 && !e.target.closest('.node')) {
    isDragging = true;
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    dragTxStart = tx; dragTyStart = ty;
  } else if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchStartDist = Math.sqrt(dx*dx+dy*dy);
    touchStartScale = scale;
  }
}, {passive:true});
wrap.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1 && isDragging) {
    tx = dragTxStart + (e.touches[0].clientX - dragStartX);
    ty = dragTyStart + (e.touches[0].clientY - dragStartY);
    applyTransform();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    scale = Math.max(0.15, Math.min(3, touchStartScale * (dist / touchStartDist)));
    applyTransform();
  }
}, {passive:true});
wrap.addEventListener('touchend', () => { isDragging = false; });

function selectPerson(id) {
  if (activeId === id) { clearSelection(); return; }
  activeId = id;
  updateHighlights();
  showDetail(id);
  const pos = positions[id];
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  tx = cw / 2 - (pos.x + NODE_W / 2) * scale;
  ty = ch / 2 - (pos.y + NODE_H / 2) * scale - 40;
  applyTransform();
}

function clearSelection() {
  activeId = null;
  document.querySelectorAll('.node').forEach(n => {
    const nid = n.id.replace('node-', '');
    n.className = getNodeClasses(nid);
  });
  document.querySelectorAll('#lines-svg path').forEach(p => p.classList.remove('highlighted'));
  document.getElementById('detail-panel').classList.remove('visible');
}

function updateHighlights() {
  const ancestors = new Set(getAncestors(activeId));
  const descendants = getAllDescendants(activeId);

  document.querySelectorAll('.node').forEach(n => {
    const nid = n.id.replace('node-', '');
    n.className = getNodeClasses(nid);
    if (nid === activeId) n.classList.add('active');
    else if (ancestors.has(nid)) n.classList.add('ancestor');
    else if (descendants.has(nid)) n.classList.add('descendant');
    else if (activeId) n.classList.add('dimmed');
  });

  const highlightedEdges = new Set();
  let cur = activeId;
  while (raw[cur].parents.length) {
    const par = raw[cur].parents[0];
    highlightedEdges.add(par + '-' + cur);
    cur = par;
  }
  raw[activeId].children.forEach(c => highlightedEdges.add(activeId + '-' + c));

  document.querySelectorAll('#lines-svg path').forEach(p => {
    const key = p.getAttribute('data-from') + '-' + p.getAttribute('data-to');
    p.classList.toggle('highlighted', highlightedEdges.has(key));
  });
}

function showDetail(id) {
  const p = raw[id];
  const ancestors = getAncestors(id);
  const siblings = getSiblings(id);
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');

  let lineage = ancestors.map(a =>
    `<span class="step" onclick="selectPerson('${a}')">${name(a)}</span><span class="arrow">\u2192</span>`
  ).join('') + `<span class="step" style="color:#e8e4dc;background:rgba(200,170,120,0.12)">${name(id)}</span>`;

  let childrenHtml = '';
  if (p.children.length) {
    childrenHtml = `<div class="detail-section"><div class="detail-section-label">Children</div><div class="tags">${p.children.map(c => `<span class="tag" onclick="selectPerson('${c}')">${name(c)}</span>`).join('')}</div></div>`;
  }

  let siblingsHtml = '';
  if (siblings.length) {
    siblingsHtml = `<div class="detail-section"><div class="detail-section-label">Siblings</div><div class="tags">${siblings.map(s => `<span class="tag" onclick="selectPerson('${s}')">${name(s)}</span>`).join('')}</div></div>`;
  }

  let notes = p.notes ? `<div style="margin-top:10px;font-size:11px;color:#6a6560;font-style:italic;line-height:1.5">${p.notes}</div>` : '';

  content.innerHTML = `<h3>${fullName(id)}</h3><div class="detail-meta"><span>Generation ${genMemo[id]+1}</span><span>${countDesc(id)} descendants</span>${p.children.length ? `<span>${p.children.length} children</span>` : ''}</div><div class="lineage">${lineage}</div>${childrenHtml}${siblingsHtml}${notes}`;
  panel.classList.add('visible');
}

document.getElementById('search').addEventListener('input', (e) => {
  const val = e.target.value.toLowerCase();
  document.querySelectorAll('.node').forEach(n => {
    const nid = n.id.replace('node-', '');
    n.className = getNodeClasses(nid);
    if (val.length > 0) {
      const matches = raw[nid].middleName.toLowerCase().includes(val) || fullName(nid).toLowerCase().includes(val);
      if (matches) n.classList.add('search-match');
      else if (!activeId) n.classList.add('dimmed');
    }
  });
});

const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');
function drawMinimap() {
  const bb = getBounds();
  const mw = 160, mh = 100;
  mmCanvas.width = mw * 2; mmCanvas.height = mh * 2;
  mmCanvas.style.width = mw + 'px'; mmCanvas.style.height = mh + 'px';
  mmCtx.clearRect(0, 0, mw * 2, mh * 2);
  const totalW = bb.maxX + PAD * 2, totalH = bb.maxY + PAD * 2;
  const s = Math.min(mw * 2 / totalW, mh * 2 / totalH);

  mmCtx.strokeStyle = 'rgba(200,170,120,0.08)';
  mmCtx.lineWidth = 1;
  Object.keys(raw).forEach(id => {
    raw[id].children.forEach(cid => {
      const p1 = positions[id], p2 = positions[cid];
      mmCtx.beginPath();
      mmCtx.moveTo((p1.x + NODE_W/2) * s, (p1.y + NODE_H) * s);
      mmCtx.lineTo((p2.x + NODE_W/2) * s, p2.y * s);
      mmCtx.stroke();
    });
  });

  Object.keys(positions).forEach(id => {
    const p = positions[id];
    mmCtx.fillStyle = id === activeId ? 'rgba(200,170,120,0.6)' : 'rgba(200,170,120,0.12)';
    mmCtx.fillRect(p.x * s, p.y * s, NODE_W * s, NODE_H * s);
  });

  const vp = document.getElementById('minimap-vp');
  const vpX = (-tx / scale) * s / 2;
  const vpY = (-ty / scale) * s / 2;
  const vpW = (wrap.clientWidth / scale) * s / 2;
  const vpH = (wrap.clientHeight / scale) * s / 2;
  vp.style.left = vpX + 'px'; vp.style.top = vpY + 'px';
  vp.style.width = vpW + 'px'; vp.style.height = vpH + 'px';
}

buildNodes();
buildLines();
resetView();

function toggleLang() {
  lang = lang === 'en' ? 'pa' : 'en';
  var label = lang === 'en' ? '\u0A2A\u0A70\u0A1C\u0A3E\u0A2C\u0A40' : 'English';
  var btn = document.getElementById('lang-toggle');
  if (btn) btn.textContent = label;
  rebuildNodeLabels();
  if (activeId) showDetail(activeId);
}

function rebuildNodeLabels() {
  document.querySelectorAll('.node').forEach(function(n) {
    var id = n.id.replace('node-', '');
    var p = raw[id];
    var dc = countDesc(id);
    var isLocation = p.notes && p.notes.indexOf('\ud83d\udccd') !== -1;
    var isNoChildren = p.notes === 'No children' || p.notes === 'Died with no children';
    var hasOtherNote = p.notes && !isNoChildren;
    var midDisplay = name(id);
    var fullDisplay = fullName(id);
    var badgeRow = '<div class="gen-badge">G' + (genMemo[id]+1) + '</div>' + (isNoChildren ? '<span class="leaf-badge">' + (lang === 'pa' ? '\u0A15\u0A4B\u0A08 \u0A14\u0A32\u0A3E\u0A26 \u0A28\u0A39\u0A40\u0A02' : p.notes.toLowerCase()) + '</span>' : '');
    var noteRow = hasOtherNote ? '<div class="card-note' + (isLocation ? ' location' : '') + '">' + p.notes + '</div>' : '';
    n.innerHTML = '<div class="mid-name">' + midDisplay + '</div><div class="full-label">' + fullDisplay + '</div>' + badgeRow + noteRow + (dc > 0 ? '<div class="desc-count">' + dc + '</div>' : '');
  });
}
</script>
